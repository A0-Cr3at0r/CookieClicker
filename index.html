<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Clicker</title>
    <link rel="icon" type="image/jpeg" href="/assets/icons/pizzaLOGO.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/main.css">


    <script type="module" src="js/main.js"></script>
    
</head>
<body>
    <header class="header">
        <button id="menuButton">☰</button>
        <h1>🍴🍕Pizza Clicker🍕🍴</h1>
            <a href="assets/icons/pizzaLOGO.jpg">
            <img src="assets/icons/pizzaLOGOWithoutBG.png" alt="Logo Pizza Clicker">
        </a>
    </header>
    
    <nav id="sideMenu" class="side-menu">
            <button id="closeButton">&times;</button>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
    </nav>
    <div id="overlay" class="overlay"></div>


    <main>
        <section class="game">
            <canvas
                id="pizzaCanvas"
                width="500"
                height="500">
            </canvas>
            <div class="stats">
                <p>Pizzas<br>sold: <span id="pizzaCount">0</span></p>
                <button id="cookButton">Cook</button>
                <p>remaining<br>slices: <span id="sliceCount">8</span></p>
            </div>
        </section>
    </main>



    <footer class="footer">

    <nav>
        <a href="#">About</a>
        <span>|</span>
