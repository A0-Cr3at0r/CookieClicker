<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Settings</title>

    <link rel="icon" type="image/jpeg" href="/assets/icons/pizzaLOGO.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/darkTheme.css">

    <script type="module" src="js/main.js"></script>
</head>

<body>

    <header class="header">
        <button id="menuButton">☰</button>
        <h1>⚙️ Settings</h1>
            <a href="assets/icons/pizzaLOGO.jpg">
            <img src="assets/icons/pizzaLOGOWithoutBG.png" alt="Logo Pizza Clicker">
        </a>
    </header>
    
    <nav id="sideMenu" class="side-menu">
            <button id="closeButton">&times;</button>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
    </nav>
    <div id="overlay" class="overlay"></div>


    <main>


        <!-- =======================
             Audio Settings
        ======================== -->

        <section>
            <h2>Audio</h2>


            <div>
                <label>
                    <input
                        id="muteAudio"
                        type="checkbox">
                    Mute
                </label>
            </div>


            <div>
                <label for="musicVolume">
                    Music Volume
                </label>

                <input
                    id="musicVolume"
                    type="range"
                    min="0"
                    max="100"
                    value="50">
            </div>



            <div>
                <label for="sfxVolume">
                    Sound Effects Volume
                </label>

                <input
                    id="sfxVolume"
                    type="range"
                    min="0"
                    max="100"
                    value="100">
            </div>

        </section>




        <!-- =======================
             Appearance Settings
        ======================== -->

        <section>
            <h2>Appearance</h2>


            <div>

                <label>
                    <input
                        id="darkTheme"
                        type="checkbox">

                    Dark Theme
                </label>

            </div>


        </section>




        <!-- =======================
             Pizza Skin Settings
        ======================== -->

        <section>

            <h2>Pizza Skin</h2>


            <div id="pizzaSkins">


                <div
                    class="pizza-skin"
                    data-skin="classic">

                    <img
                        src="assets/images/PizzaGameWithoutBG.png"
                        alt="Classic Pizza">

                    <p>
                        Classic
                    </p>

                </div>



                <div
                    class="pizza-skin"
                    data-skin="pepperoni">

                    <img
                        src="assets/images/PizzaGameWithoutBG.png"
                        alt="Mexican Pizza">

                    <p>
                        Mexican
                    </p>

                </div>


                <div
                    class="pizza-skin"
                    data-skin="gold">

                    <img
                        src="assets/images/PizzaGameWithoutBG.png"
                        alt="Ultimate Pizza">

                    <p>
                        Ultimate
                    </p>

                </div>



            </div>


        </section>






        <!-- =======================
             Gameplay Settings
        ======================== -->

        <section>

            <h2>Gameplay</h2>


            <div>

                <label>

                    <input
                        id="autoSave"
                        type="checkbox"
                        checked>

                    Auto Save

                </label>

            </div>



            <div>

                <label>

                    <input
                        id="showFPS"
                        type="checkbox">

                    Show FPS

                </label>

            </div>


        </section>





        <!-- =======================
             Save Data
        ======================== -->

        <section class="save-data">

            <h2>Save Data</h2>

            <p>
                *Your progress is saved automatically.
            </p>

            <button id="resetButton">
                Reset Progress
            </button>

        </section>



    </main>


    <footer class="footer">
        <p>&copy; 2026 Pizza Clicker. All rights reserved.</p>

        <nav>
            <a href="#">About</a>
            <span>|</span>
            <a href="#">Legal Notices</a>
            <span>|</span>
            <a href="#">Contact</a>
        </nav>

        <button id="backButton">
            ← Back to Game
        </button>

    </footer>


</body>

</html>
